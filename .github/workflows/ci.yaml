name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [bun, node]
    steps:
      - uses: actions/checkout@v4
      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ">=24"
      - run: ${{ matrix.runtime }} skills/github/test.ts
